<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/og-image.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/og-image.png">
  <link rel="icon" href="{{ site.baseurl }}/assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/favicon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
  <script src="{{ site.baseurl }}/assets/allium-highlight.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="{{ site.baseurl }}/" class="nav-brand">
        <img src="{{ site.baseurl }}/assets/logo-white.png" alt="Allium" class="logo">
        <div class="brand-text">
          <h1 class="brand-title">Allium</h1>
        </div>
      </a>
      <ul class="nav-menu">
        <li><a href="{{ site.baseurl }}/usage" class="{% if page.url contains '/usage' %}active{% endif %}">Usage</a></li>
        <li><a href="{{ site.baseurl }}/language" class="{% if page.url contains '/language' %}active{% endif %}">Language</a></li>
        <li><a href="{{ site.baseurl }}/installation" class="{% if page.url contains '/installation' %}active{% endif %}">Install</a></li>
        <li><a href="{{ site.baseurl }}/about" class="{% if page.url contains '/about' %}active{% endif %}">About</a></li>
      </ul>
    </div>
  </nav>
  {% if page.layout_variant == 'home' %}
    <main class="main-home">
      {{ content }}
    </main>
  {% else %}
    <main class="main-prose">
      {{ content }}
    </main>
  {% endif %}
  <footer>
    <div class="footer-inner">
      <a href="{{ site.baseurl }}/" class="footer-brand">
        <img src="{{ site.baseurl }}/assets/logo-white.png" alt="Allium" class="footer-logo">
        <span class="footer-name">Allium</span>
      </a>
      <p>© JUXT Ltd 2026 &middot; Velocity through clarity &middot; <a href="https://github.com/juxt/allium">GitHub</a></p>
    </div>
  </footer>
  <script>
    (function () {
      var els = document.querySelectorAll('[data-reveal]');
      if (!els.length) return;
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce || !('IntersectionObserver' in window)) {
        els.forEach(function (el) { el.classList.add('is-in'); });
        return;
      }
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('is-in'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.15 });
      els.forEach(function (el) { obs.observe(el); });
    })();
  </script>
  <script>
    (function () {
      var root = document.querySelector('[data-carousel]');
      if (!root) return;
      var viewport = root.querySelector('.testi__viewport');
      var track = root.querySelector('.testi__track');
      var slides = root.querySelectorAll('.testi__slide');
      var dots = root.querySelectorAll('.testi__dot');
      if (!viewport || !track || slides.length < 2) return;

      var index = 0;
      var count = slides.length;
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var timer = null;

      function center() {
        var active = slides[index];
        var offset = active.offsetLeft - (viewport.clientWidth - active.clientWidth) / 2;
        track.style.transform = 'translateX(' + (-offset) + 'px)';
      }
      function go(i) {
        index = (i + count) % count;
        for (var d = 0; d < count; d++) { slides[d].classList.toggle('is-active', d === index); }
        for (var k = 0; k < dots.length; k++) {
          var on = k === index;
          dots[k].classList.toggle('is-active', on);
          if (on) { dots[k].setAttribute('aria-current', 'true'); }
          else { dots[k].removeAttribute('aria-current'); }
        }
        center();
      }
      function stop() { if (timer) { clearInterval(timer); timer = null; } }
      function play() { if (reduce || timer) return; timer = setInterval(function () { go(index + 1); }, 6000); }

      for (var d = 0; d < dots.length; d++) {
        (function (n) { dots[n].addEventListener('click', function () { stop(); go(n); }); })(d);
      }
      window.addEventListener('resize', center);
      window.addEventListener('load', center);

      // ---- drag / swipe (pointer events cover mouse + touch) ----
      function baseOffset() {
        var active = slides[index];
        return active.offsetLeft - (viewport.clientWidth - active.clientWidth) / 2;
      }
      var dragging = false, startX = 0, base = 0, moved = 0;
      viewport.addEventListener('pointerdown', function (e) {
        if (e.button && e.button !== 0) return;
        dragging = true; startX = e.clientX; moved = 0; base = baseOffset();
        track.style.transition = 'none';
        viewport.classList.add('is-dragging');
        stop();
        if (viewport.setPointerCapture) viewport.setPointerCapture(e.pointerId);
      });
      viewport.addEventListener('pointermove', function (e) {
        if (!dragging) return;
        moved = e.clientX - startX;
        track.style.transform = 'translateX(' + (moved - base) + 'px)';
      });
      function endDrag() {
        if (!dragging) return;
        dragging = false;
        viewport.classList.remove('is-dragging');
        track.style.transition = '';
        var threshold = Math.min(80, viewport.clientWidth * 0.15);
        if (Math.abs(moved) > threshold) { go(index + (moved < 0 ? 1 : -1)); }
        else { center(); }
        play();
      }
      viewport.addEventListener('pointerup', endDrag);
      viewport.addEventListener('pointercancel', endDrag);
      viewport.addEventListener('dragstart', function (e) { e.preventDefault(); });

      root.addEventListener('mouseenter', stop);
      root.addEventListener('mouseleave', play);
      root.addEventListener('focusin', stop);
      root.addEventListener('focusout', play);

      go(0);
      play();
    })();
  </script>
</body>
</html>
